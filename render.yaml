services:
  - type: web
    name: geo-mate-web
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: GEO MATE
      - key: DATA_DIR
        value: /var/data
      - key: SHOW_DEV_CODES
        value: "false"
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SMS_PROVIDER
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
    disk:
      name: geo-mate-data
      mountPath: /var/data
      sizeGB: 2
