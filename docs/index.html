<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GEO MATE | Public Website</title>
    <meta
      name="description"
      content="GEO MATE public website. Open the live app and install it on your phone."
    />
    <style>
      :root {
        --bg: #0f141d;
        --panel: #151d2a;
        --ink: #f4f7fb;
        --muted: #c0cbdb;
        --brand: #cb1f35;
        --brand2: #ff5a73;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at 8% 10%, #27344a, transparent 36%),
          radial-gradient(circle at 90% 0%, rgba(203, 31, 53, 0.35), transparent 34%),
          var(--bg);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(780px, 100%);
        border: 1px solid #2a3a54;
        border-radius: 20px;
        background: linear-gradient(165deg, #1a2537, var(--panel));
        padding: 28px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.7rem);
        line-height: 1.08;
      }
      p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        padding: 11px 15px;
        text-decoration: none;
        font-weight: 700;
      }
      .btn-primary {
        color: #fff;
        background: linear-gradient(155deg, var(--brand2), var(--brand));
      }
      .btn-ghost {
        color: #dce5f2;
        border: 1px solid #365077;
      }
      .note {
        margin-top: 18px;
        font-size: 0.92rem;
      }
      code {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>GEO MATE is live on web</h1>
      <p>
        This is the public GitHub Pages website. Use the live app link below for full
        signup, matching, chat, and phone install (PWA).
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="https://geo-mate-web.onrender.com" target="_blank" rel="noreferrer"
          >Open Live App</a
        >
        <a class="btn btn-ghost" href="https://github.com/georgebenedict77/geo-mate" target="_blank" rel="noreferrer"
          >View GitHub Repo</a
        >
      </div>
      <p class="note">
        If you open the live app on phone browser, tap
        <code>Add to Home Screen</code> to install it like an app.
      </p>
    </main>
  </body>
</html>
